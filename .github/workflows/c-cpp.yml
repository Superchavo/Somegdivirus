name: Build GDI Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSVC (Developer Command Prompt)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile C++ Source
        # We use cl.exe (Microsoft C++ Compiler)
        # /EHsc: Enables C++ exceptions
        # /MT: Statically links the Runtime Library (so it runs without extra DLLs)
        # /link /SUBSYSTEM:WINDOWS: Ensures it runs as a background GUI app, not a console app
        run: |
          cl.exe /EHsc /MT main.cpp /link /SUBSYSTEM:WINDOWS /OUT:GDI_Payload.exe

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: GDI_Binary
          path: GDI_Payload.exe

    
